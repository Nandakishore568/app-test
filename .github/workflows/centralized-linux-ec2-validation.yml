name: Centralized Linux EC2 Validation

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region
        required: true
        default: us-west-2
      server_name:
        description: EC2 Name tag
        required: false
        default: ""
      instance_id:
        description: EC2 instance id
        required: false
        default: ""
      expected_instance_id:
        description: Expected instance id for validation
        required: false
        default: ""
      expected_name_tag:
        description: Expected Name tag for validation
        required: false
        default: ""
      expected_hostname:
        description: Expected Linux hostname
        required: false
        default: ""
      expected_timezone:
        description: Expected Linux timezone
        required: true
        default: "UTC"
      expected_domain:
        description: Expected domain
        required: false
        default: ""
      dns_name_to_resolve:
        description: Optional DNS name
        required: false
        default: ""
      required_services_csv:
        description: Required services
        required: true
        default: "amazon-ssm-agent,amazon-cloudwatch-agent"
      fail_on_validation_issues:
        description: Fail if any validation fails
        required: true
        default: "false"

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      DOCUMENT_NAME: Centralized-Linux-EC2-Validation

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.region }}
          role-to-assume: arn:aws:iam::345362761155:role/OIDCRoleForGitHubActions

      - name: Resolve target instance, display metadata, run EC2 checks, and invoke SSM
        shell: bash
        env:
          REGION: ${{ inputs.region }}
          SERVER_NAME: ${{ inputs.server_name }}
          INSTANCE_ID: ${{ inputs.instance_id }}
          EXPECTED_INSTANCE_ID: ${{ inputs.expected_instance_id }}
          EXPECTED_NAME_TAG: ${{ inputs.expected_name_tag }}
          EXPECTED_HOSTNAME: ${{ inputs.expected_hostname }}
          EXPECTED_TIMEZONE: ${{ inputs.expected_timezone }}
          EXPECTED_DOMAIN: ${{ inputs.expected_domain }}
          DNS_NAME_TO_RESOLVE: ${{ inputs.dns_name_to_resolve }}
          REQUIRED_SERVICES_CSV: ${{ inputs.required_services_csv }}
          FAIL_ON_VALIDATION_ISSUES: ${{ inputs.fail_on_validation_issues }}
        run: |
          set -euo pipefail

          log() {
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] $*"
          }

          PASS_COUNT=0
          FAIL_COUNT=0
          SKIP_COUNT=0
          TOTAL_CHECKS=0
          PASSED_CHECKS=""
          FAILED_CHECKS=""
          SKIPPED_CHECKS=""

          add_pass() {
            echo "PASS - $1"
            PASS_COUNT=$((PASS_COUNT + 1))
            TOTAL_CHECKS=$((TOTAL_CHECKS + 1))
            PASSED_CHECKS="${PASSED_CHECKS}\n    - $1"
          }

          add_fail() {
            echo "FAIL - $1"
            FAIL_COUNT=$((FAIL_COUNT + 1))
            TOTAL_CHECKS=$((TOTAL_CHECKS + 1))
            FAILED_CHECKS="${FAILED_CHECKS}\n    - $1"
          }

          add_skip() {
            echo "SKIP - $1"
            SKIP_COUNT=$((SKIP_COUNT + 1))
            TOTAL_CHECKS=$((TOTAL_CHECKS + 1))
            SKIPPED_CHECKS="${SKIPPED_CHECKS}\n    - $1"
          }

          compare_exact() {
            local label="$1"
            local expected="$2"
            local actual="$3"

            if [ -z "$expected" ]; then
              add_skip "$label (no expected value supplied)"
              return
            fi

            if [ "$expected" = "$actual" ]; then
              add_pass "$label matches expected value"
            else
              add_fail "$label expected '$expected' but got '$actual'"
            fi
          }

          compare_ci() {
            local label="$1"
            local expected="$2"
            local actual="$3"

            if [ -z "$expected" ]; then
              add_skip "$label (no expected value supplied)"
              return
            fi

            if [ "$(echo "$expected" | tr '[:upper:]' '[:lower:]')" = "$(echo "$actual" | tr '[:upper:]' '[:lower:]')" ]; then
              add_pass "$label matches expected value"
            else
              add_fail "$label expected '$expected' but got '$actual'"
            fi
          }

          print_summary() {
            echo
            echo "Validation summary:"
            echo "  Total checks : $TOTAL_CHECKS"
            echo "  Passed       : $PASS_COUNT"
            echo "  Failed       : $FAIL_COUNT"
            echo "  Skipped      : $SKIP_COUNT"

            if [ -n "$FAILED_CHECKS" ]; then
              echo "  Failed check details:"
              printf "%b\n" "$FAILED_CHECKS"
            fi

            if [ -n "$PASSED_CHECKS" ]; then
              echo "  Passed check details:"
              printf "%b\n" "$PASSED_CHECKS"
            fi

            if [ -n "$SKIPPED_CHECKS" ]; then
              echo "  Skipped check details:"
              printf "%b\n" "$SKIPPED_CHECKS"
            fi
          }

          log "Resolving target instance..."

          if [ -n "$INSTANCE_ID" ]; then
            TARGET_INSTANCE_ID="$INSTANCE_ID"
          else
            IDS="$(aws ec2 describe-instances \
              --region "$REGION" \
              --filters "Name=tag:Name,Values=$SERVER_NAME" "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].InstanceId" \
              --output text)"

            if [ -z "$IDS" ] || [ "$IDS" = "None" ]; then
              echo "No running instance found for server_name=$SERVER_NAME" >&2
              exit 1
            fi

            set -- $IDS
            if [ "$#" -gt 1 ]; then
              echo "Multiple running instances found for server_name=$SERVER_NAME. Use instance_id." >&2
              exit 1
            fi

            TARGET_INSTANCE_ID="$1"
          fi

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"

          INSTANCE_JSON="$(aws ec2 describe-instances \
            --region "$REGION" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --output json)"

          INSTANCE_NAME="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].Tags[]? | select(.Key=="Name") | .Value' | head -n1)"
          [ -n "${INSTANCE_NAME:-}" ] || INSTANCE_NAME="N/A"

          INSTANCE_STATE="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].State.Name // "N/A"')"
          PLATFORM_DETAILS="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].PlatformDetails // "N/A"')"
          PRIMARY_IP="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].PrivateIpAddress // ""')"
          VPC_ID="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].VpcId // "N/A"')"
          SUBNET_ID="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].SubnetId // "N/A"')"
          INSTANCE_TYPE="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].InstanceType // "N/A"')"
          EBS_COUNT="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].BlockDeviceMappings | length')"

          SECONDARY_IPS="$(echo "$INSTANCE_JSON" | jq -r '[.Reservations[0].Instances[0].NetworkInterfaces[0].PrivateIpAddresses[]? | select(.Primary==false) | .PrivateIpAddress] | join(",")')"
          [ -n "${SECONDARY_IPS:-}" ] || SECONDARY_IPS="None"

          SG_IDS="$(echo "$INSTANCE_JSON" | jq -r '[.Reservations[0].Instances[0].SecurityGroups[]?.GroupId] | join(",")')"
          SG_NAMES="$(echo "$INSTANCE_JSON" | jq -r '[.Reservations[0].Instances[0].SecurityGroups[]?.GroupName] | join(",")')"
          [ -n "${SG_IDS:-}" ] || SG_IDS="None"
          [ -n "${SG_NAMES:-}" ] || SG_NAMES="None"

          VPC_NAME="$(aws ec2 describe-tags \
            --region "$REGION" \
            --filters "Name=resource-id,Values=$VPC_ID" "Name=key,Values=Name" \
            --query "Tags[0].Value" \
            --output text 2>/dev/null || true)"
          [ -n "${VPC_NAME:-}" ] && [ "$VPC_NAME" != "None" ] || VPC_NAME="(No Name tag)"

          SUBNET_NAME="$(aws ec2 describe-tags \
            --region "$REGION" \
            --filters "Name=resource-id,Values=$SUBNET_ID" "Name=key,Values=Name" \
            --query "Tags[0].Value" \
            --output text 2>/dev/null || true)"
          [ -n "${SUBNET_NAME:-}" ] && [ "$SUBNET_NAME" != "None" ] || SUBNET_NAME="(No Name tag)"

          INSTANCE_TYPE_JSON="$(aws ec2 describe-instance-types \
            --region "$REGION" \
            --instance-types "$INSTANCE_TYPE" \
            --output json)"

          VCPU="$(echo "$INSTANCE_TYPE_JSON" | jq -r '.InstanceTypes[0].VCpuInfo.DefaultVCpus // "N/A"')"
          RAM_MIB="$(echo "$INSTANCE_TYPE_JSON" | jq -r '.InstanceTypes[0].MemoryInfo.SizeInMiB // 0')"
          RAM_GB="$(awk "BEGIN {printf \"%.2f\", $RAM_MIB/1024}")"

          HEALTH_JSON="$(aws ec2 describe-instance-status \
            --region "$REGION" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --include-all-instances \
            --output json)"

          SYSTEM_STATUS="$(echo "$HEALTH_JSON" | jq -r '.InstanceStatuses[0].SystemStatus.Status // "N/A"')"
          INSTANCE_STATUS="$(echo "$HEALTH_JSON" | jq -r '.InstanceStatuses[0].InstanceStatus.Status // "N/A"')"

          echo
          log "Server attributes"
          echo

          printf "%-20s %-15s %-20s %-15s %-20s %-20s %-15s %-10s %-10s %-10s %-10s %-25s %-30s %-15s %-15s %-30s\n" \
            "Server Name" "Region" "Instance ID" "Account ID" "VPC Name" "Subnet Name" "Primary IP" "EBS Cnt" "Type" "vCPUs" "RAM(GB)" "SG Names" "SG IDs" "SysHealth" "InstHealth" "Sec. IPs"

          echo "--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------"

          printf "%-20s %-15s %-20s %-15s %-20s %-20s %-15s %-10s %-10s %-10s %-10s %-25s %-30s %-15s %-15s %-30s\n" \
            "$INSTANCE_NAME" "$REGION" "$TARGET_INSTANCE_ID" "$ACCOUNT_ID" "$VPC_NAME" "$SUBNET_NAME" "${PRIMARY_IP:-N/A}" "$EBS_COUNT" "$INSTANCE_TYPE" "$VCPU" "$RAM_GB" "$SG_NAMES" "$SG_IDS" "$SYSTEM_STATUS" "$INSTANCE_STATUS" "$SECONDARY_IPS"

          echo
          echo
          echo "Device Name     Volume ID            Type       Size(GB)   IOPS       Encrypted"
          echo "--------------------------------------------------------------------------------"

          BLOCK_DEVICE_ROWS="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].BlockDeviceMappings[]? | [.DeviceName, .Ebs.VolumeId] | @tsv')"

          if [ -z "${BLOCK_DEVICE_ROWS:-}" ]; then
            echo "No EBS volumes found."
          else
            while IFS=$'\t' read -r DEVICE VOLUME_ID; do
              [ -n "${VOLUME_ID:-}" ] || continue

              VOLUME_JSON="$(aws ec2 describe-volumes \
                --region "$REGION" \
                --volume-ids "$VOLUME_ID" \
                --output json)"

              VTYPE="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].VolumeType // "N/A"')"
              VSIZE="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].Size // "N/A"')"
              VIOPS="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].Iops // 100')"
              VENCRYPTED="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].Encrypted // "N/A"')"

              printf "%-15s %-20s %-10s %-10s %-10s %-10s\n" \
                "$DEVICE" "$VOLUME_ID" "$VTYPE" "$VSIZE" "$VIOPS" "$VENCRYPTED"
            done <<< "$BLOCK_DEVICE_ROWS"
          fi

          echo
          echo
          echo "Tag Key                        Tag Value"
          echo "----------------------------------------------------------"

          TAG_ROWS="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].Tags[]? | [.Key, .Value] | @tsv')"

          if [ -z "${TAG_ROWS:-}" ]; then
            echo "No tags found."
          else
            while IFS=$'\t' read -r KEY VALUE; do
              printf "%-30s %-50s\n" "$KEY" "$VALUE"
            done <<< "$TAG_ROWS"
          fi

          echo
          log "Running EC2-level checks..."
          echo

          if [ "$INSTANCE_STATE" = "running" ]; then
            add_pass "Instance state is running"
          else
            add_fail "Instance state expected 'running' but got '$INSTANCE_STATE'"
          fi

          case "$(echo "$PLATFORM_DETAILS" | tr '[:upper:]' '[:lower:]')" in
            *linux*|*unix*)
              add_pass "Platform is Linux"
              ;;
            *)
              add_fail "Platform expected Linux but got '$PLATFORM_DETAILS'"
              ;;
          esac

          if [ -n "$PRIMARY_IP" ]; then
            add_pass "Primary private IP is populated"
          else
            add_fail "Primary private IP is not populated"
          fi

          compare_exact "InstanceId" "$EXPECTED_INSTANCE_ID" "$TARGET_INSTANCE_ID"
          compare_ci "EC2 Name tag" "$EXPECTED_NAME_TAG" "$INSTANCE_NAME"

          echo
          log "Building SSM command payload..."

          python3 - <<'PY'
          import json
          import os

          params = {
              "ExpectedHostname": [os.environ.get("EXPECTED_HOSTNAME", "")],
              "ExpectedTimezone": [os.environ.get("EXPECTED_TIMEZONE", "")],
              "ExpectedDomain": [os.environ.get("EXPECTED_DOMAIN", "")],
              "DnsNameToResolve": [os.environ.get("DNS_NAME_TO_RESOLVE", "")],
              "RequiredServicesCsv": [os.environ.get("REQUIRED_SERVICES_CSV", "")],
              "FailOnValidationIssues": [os.environ.get("FAIL_ON_VALIDATION_ISSUES", "false")]
          }

          with open("params.json", "w", encoding="utf-8") as f:
              json.dump(params, f)
          PY

          echo
          log "Sending SSM command..."

          COMMAND_ID="$(aws ssm send-command \
            --region "$REGION" \
            --document-name "$DOCUMENT_NAME" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --parameters file://params.json \
            --query "Command.CommandId" \
            --output text)"

          log "SSM command id: $COMMAND_ID"

          ATTEMPT=0
          FINAL_STATUS=""

          while [ "$ATTEMPT" -lt 30 ]; do
            ATTEMPT=$((ATTEMPT + 1))

            STATUS="$(aws ssm get-command-invocation \
              --region "$REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$TARGET_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)"

            case "$STATUS" in
              Success)
                FINAL_STATUS="Success"
                log "SSM command completed successfully"
                break
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                FINAL_STATUS="$STATUS"
                log "SSM command completed with status: $STATUS"
                break
                ;;
              Pending|InProgress|Delayed|"")
                log "Waiting for SSM command... attempt $ATTEMPT/30"
                sleep 6
                ;;
              *)
                log "SSM command current status: $STATUS"
                sleep 6
                ;;
            esac
          done

          if [ -z "$FINAL_STATUS" ]; then
            FINAL_STATUS="$(aws ssm get-command-invocation \
              --region "$REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$TARGET_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo Unknown)"
          fi

          echo
          log "Retrieving SSM invocation details..."

          INVOCATION_JSON="$(aws ssm list-command-invocations \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --details \
            --output json)"

          echo
          log "SSM plugin details"
          echo "$INVOCATION_JSON" | jq -r '
            .CommandInvocations[0].CommandPlugins[]? |
            "Plugin: \(.Name)
Status: \(.Status)
ResponseCode: \(.ResponseCode)
----- Output -----
\(.Output // "(no output)")
------------------"
          '

          STDOUT_CONTENT="$(aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text 2>/dev/null || true)"

          STDERR_CONTENT="$(aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text 2>/dev/null || true)"

          if [ -n "${STDOUT_CONTENT:-}" ] && [ "$STDOUT_CONTENT" != "None" ]; then
            echo
            log "Top-level stdout"
            printf "%b\n" "$STDOUT_CONTENT"
          fi

          if [ -n "${STDERR_CONTENT:-}" ] && [ "$STDERR_CONTENT" != "None" ]; then
            echo
            log "Top-level stderr"
            printf "%b\n" "$STDERR_CONTENT" >&2
          fi

          if [ "$FINAL_STATUS" != "Success" ]; then
            echo
            print_summary
            exit 1
          fi

          echo
          log "Workflow completed successfully"
