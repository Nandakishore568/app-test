name: Centralized Windows EC2 Validation

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region
        required: true
        default: us-west-2
        type: string
      aws_role_arn:
        description: IAM role ARN for GitHub OIDC
        required: true
        type: string
      document_name:
        description: SSM Command document name
        required: true
        default: Centralized-Windows-EC2-Validation
        type: string
      instance_id:
        description: Target EC2 instance ID (preferred if known)
        required: false
        default: ""
        type: string
      server_name:
        description: EC2 Name tag / server name
        required: false
        default: ""
        type: string
      dns_lookup_name:
        description: Optional DNS name to resolve
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  validate-windows-ec2:
    runs-on: ubuntu-latest
    env:
      DOCUMENT_NAME: ${{ inputs.document_name }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.region }}
          role-to-assume: ${{ inputs.aws_role_arn }}

      - name: Verify runner tools
        shell: bash
        run: |
          set -euo pipefail
          aws --version
          jq --version
          python3 --version

      - name: 1) Resolve target instance
        shell: bash
        env:
          REGION: ${{ inputs.region }}
          INPUT_INSTANCE_ID: ${{ inputs.instance_id }}
          INPUT_SERVER_NAME: ${{ inputs.server_name }}
          INPUT_DNS_LOOKUP_NAME: ${{ inputs.dns_lookup_name }}
        run: |
          set -euo pipefail

          log() {
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] $*"
          }

          if [ -n "${INPUT_INSTANCE_ID:-}" ]; then
            log "Resolving instance from instance ID: $INPUT_INSTANCE_ID"

            DESCRIBE_JSON="$(aws ec2 describe-instances \
              --region "$REGION" \
              --instance-ids "$INPUT_INSTANCE_ID" \
              --output json)"
          elif [ -n "${INPUT_SERVER_NAME:-}" ]; then
            log "Resolving instance from Name tag: $INPUT_SERVER_NAME"

            DESCRIBE_JSON="$(aws ec2 describe-instances \
              --region "$REGION" \
              --filters \
                "Name=tag:Name,Values=$INPUT_SERVER_NAME" \
                "Name=instance-state-name,Values=pending,running,stopping,stopped" \
              --output json)"
          else
            echo "Provide either 'instance_id' or 'server_name'." >&2
            exit 1
          fi

          MATCH_COUNT="$(echo "$DESCRIBE_JSON" | jq '[.Reservations[].Instances[]] | length')"

          if [ "$MATCH_COUNT" = "0" ]; then
            echo "No matching EC2 instance found." >&2
            exit 1
          fi

          if [ "$MATCH_COUNT" -gt 1 ]; then
            echo "Multiple EC2 instances matched. Use 'instance_id' for an exact target." >&2
            exit 1
          fi

          TARGET_INSTANCE_ID="$(echo "$DESCRIBE_JSON" | jq -r '.Reservations[0].Instances[0].InstanceId')"
          INSTANCE_NAME="$(echo "$DESCRIBE_JSON" | jq -r '.Reservations[0].Instances[0].Tags[]? | select(.Key=="Name") | .Value' | head -n1)"
          PRIVATE_IP="$(echo "$DESCRIBE_JSON" | jq -r '.Reservations[0].Instances[0].PrivateIpAddress // "N/A"')"
          INSTANCE_STATE="$(echo "$DESCRIBE_JSON" | jq -r '.Reservations[0].Instances[0].State.Name // "N/A"')"
          PLATFORM_DETAILS="$(echo "$DESCRIBE_JSON" | jq -r '.Reservations[0].Instances[0].PlatformDetails // "N/A"')"

          if [ -z "${INSTANCE_NAME:-}" ] && [ -n "${INPUT_SERVER_NAME:-}" ]; then
            INSTANCE_NAME="$INPUT_SERVER_NAME"
          fi

          DNS_LOOKUP_NAME="${INPUT_DNS_LOOKUP_NAME:-}"
          if [ -z "${DNS_LOOKUP_NAME:-}" ]; then
            if [ -n "${INSTANCE_NAME:-}" ]; then
              DNS_LOOKUP_NAME="$INSTANCE_NAME"
            else
              DNS_LOOKUP_NAME="N/A"
            fi
          fi

          {
            echo "TARGET_INSTANCE_ID=$TARGET_INSTANCE_ID"
            echo "INSTANCE_NAME=${INSTANCE_NAME:-N/A}"
            echo "DNS_LOOKUP_NAME=$DNS_LOOKUP_NAME"
            echo "PRIVATE_IP=$PRIVATE_IP"
            echo "INSTANCE_STATE=$INSTANCE_STATE"
            echo "PLATFORM_DETAILS=$PLATFORM_DETAILS"
          } >> "$GITHUB_ENV"

          log "Resolved target instance"
          printf "%-26s | %s\n" "Attribute" "Value"
          printf "%-26s-+-%s\n" "--------------------------" "----------------------------------------------------------------"
          printf "%-26s | %s\n" "Target Instance ID" "$TARGET_INSTANCE_ID"
          printf "%-26s | %s\n" "Server Name" "${INSTANCE_NAME:-N/A}"
          printf "%-26s | %s\n" "Private IP" "$PRIVATE_IP"
          printf "%-26s | %s\n" "State" "$INSTANCE_STATE"
          printf "%-26s | %s\n" "Platform" "$PLATFORM_DETAILS"
          printf "%-26s | %s\n" "DNS Lookup Name" "$DNS_LOOKUP_NAME"

      - name: 2) SSM Checks
        shell: bash
        env:
          REGION: ${{ inputs.region }}
        run: |
          set -euo pipefail

          log() {
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] $*"
          }

          print_kv_header() {
            printf "%-26s | %s\n" "Attribute" "Value"
            printf "%-26s-+-%s\n" "--------------------------" "----------------------------------------------------------------"
          }

          print_kv_row() {
            printf "%-26s | %s\n" "$1" "$2"
          }

          print_section_gap() {
            printf "\n"
          }

          log "Validating SSM document..."

          DOCUMENT_TYPE="$(aws ssm describe-document \
            --region "$REGION" \
            --name "$DOCUMENT_NAME" \
            --query 'Document.DocumentType' \
            --output text 2>/dev/null || true)"

          if [ -z "${DOCUMENT_TYPE:-}" ] || [ "$DOCUMENT_TYPE" = "None" ]; then
            echo "SSM document not found: $DOCUMENT_NAME" >&2
            exit 1
          fi

          if [ "$DOCUMENT_TYPE" != "Command" ]; then
            echo "SSM document $DOCUMENT_NAME is type '$DOCUMENT_TYPE', but send-command requires type 'Command'." >&2
            exit 1
          fi

          log "Sending SSM validation command..."

          if [ -n "${DNS_LOOKUP_NAME:-}" ] && [ "$DNS_LOOKUP_NAME" != "N/A" ]; then
            COMMAND_ID="$(aws ssm send-command \
              --region "$REGION" \
              --document-name "$DOCUMENT_NAME" \
              --instance-ids "$TARGET_INSTANCE_ID" \
              --parameters "DnsNameToResolve=$DNS_LOOKUP_NAME" \
              --query "Command.CommandId" \
              --output text)"
          else
            COMMAND_ID="$(aws ssm send-command \
              --region "$REGION" \
              --document-name "$DOCUMENT_NAME" \
              --instance-ids "$TARGET_INSTANCE_ID" \
              --query "Command.CommandId" \
              --output text)"
          fi

          ATTEMPT=0
          FINAL_STATUS=""

          while [ "$ATTEMPT" -lt 30 ]; do
            ATTEMPT=$((ATTEMPT + 1))
            STATUS="$(aws ssm get-command-invocation \
              --region "$REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$TARGET_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)"

            case "$STATUS" in
              Success)
                FINAL_STATUS="Success"
                log "SSM command completed successfully"
                break
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                FINAL_STATUS="$STATUS"
                log "SSM command completed with status: $STATUS"
                break
                ;;
              Pending|InProgress|Delayed|"")
                log "Waiting for SSM command... attempt $ATTEMPT/30"
                sleep 6
                ;;
              *)
                log "SSM command current status: $STATUS"
                sleep 6
                ;;
            esac
          done

          INVOCATION_JSON="$(aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --output json)"

          PLUGIN_NAME="$(echo "$INVOCATION_JSON" | jq -r '.PluginName // "N/A"')"
          RESPONSE_CODE="$(echo "$INVOCATION_JSON" | jq -r '.ResponseCode // "N/A"')"
          STATUS_DETAILS="$(echo "$INVOCATION_JSON" | jq -r '.StatusDetails // "N/A"')"
          STANDARD_OUTPUT="$(echo "$INVOCATION_JSON" | jq -r '.StandardOutputContent // ""' | tr -d '\r')"
          STANDARD_ERROR="$(echo "$INVOCATION_JSON" | jq -r '.StandardErrorContent // ""' | tr -d '\r')"

          log "SSM checks"
          print_kv_header
          print_kv_row "Document Name" "$DOCUMENT_NAME"
          print_kv_row "Target Instance ID" "$TARGET_INSTANCE_ID"
          print_kv_row "Server Name" "${INSTANCE_NAME:-N/A}"
          print_kv_row "DNS Lookup Name" "${DNS_LOOKUP_NAME:-N/A}"
          print_kv_row "Command ID" "$COMMAND_ID"
          print_kv_row "Plugin Name" "$PLUGIN_NAME"
          print_kv_row "Status" "${FINAL_STATUS:-$STATUS_DETAILS}"
          print_kv_row "Response Code" "$RESPONSE_CODE"

          export STANDARD_OUTPUT

          python3 <<'PY'
          import os
          import re
          import subprocess

          def utc_now():
              return subprocess.check_output(
                  ["date", "-u", "+%Y-%m-%dT%H:%M:%SZ"],
                  text=True
              ).strip()

          text = os.environ.get("STANDARD_OUTPUT", "").replace("\r", "")
          lines = [line.rstrip() for line in text.splitlines()]

          system_rows = []
          dns_rows = []
          service_rows = []
          disk_rows = []

          current = None
          pending_dns = None

          for raw in lines:
              line = raw.strip()
              if not line:
                  continue
              if re.fullmatch(r'-{2,}', line):
                  continue

              if line == "System":
                  current = "system"
                  pending_dns = None
                  continue
              elif line == "DNS Resolution":
                  current = "dns"
                  pending_dns = None
                  continue
              elif line == "Service Status":
                  current = "service"
                  pending_dns = None
                  continue
              elif line == "Disk Details":
                  current = "disk"
                  pending_dns = None
                  continue

              if current == "system":
                  m = re.match(r'^(.*?)\s*:\s*(.*)$', line)
                  if m:
                      system_rows.append((m.group(1).strip(), m.group(2).strip() or "N/A"))

              elif current == "dns":
                  if line.startswith("nslookup "):
                      pending_dns = line
                  elif line.startswith("-") and pending_dns:
                      dns_rows.append((pending_dns, line.lstrip("-").strip() or "N/A"))
                      pending_dns = None

              elif current == "service":
                  m = re.match(r'^-\s*(.*?)\s+exists=(\S+)\s+status=(\S+)$', line)
                  if m:
                      service_rows.append((m.group(1).strip(), m.group(2).strip(), m.group(3).strip()))

              elif current == "disk":
                  if line.startswith("-"):
                      content = line.lstrip("-").strip()
                      pairs = dict(re.findall(r'(\w+)=([^\s]+)', content))
                      disk_rows.append((
                          pairs.get("Drive", "N/A"),
                          pairs.get("VolumeName", "N/A"),
                          pairs.get("FileSystem", "N/A"),
                          pairs.get("SizeGB", "N/A"),
                          pairs.get("FreeGB", "N/A"),
                      ))

          def gap():
              print()

          def print_table(title, headers, rows, widths):
              gap()
              print(f"[{utc_now()}] {title}")
              print(" | ".join(f"{h:<{w}}" for h, w in zip(headers, widths)))
              print("-+-".join("-" * w for w in widths))
              for row in rows:
                  print(" | ".join(f"{str(v):<{w}}" for v, w in zip(row, widths)))

          if system_rows:
              print_table(
                  "SSM output - System",
                  ["Attribute", "Value"],
                  system_rows,
                  [26, 64]
              )

          if dns_rows:
              print_table(
                  "SSM output - DNS Resolution",
                  ["Command", "Output"],
                  dns_rows,
                  [38, 64]
              )

          if service_rows:
              print_table(
                  "SSM output - Service Status",
                  ["Service", "Exists", "Status"],
                  service_rows,
                  [28, 10, 16]
              )

          if disk_rows:
              print_table(
                  "SSM output - Disk Details",
                  ["Drive", "VolumeName", "FileSystem", "SizeGB", "FreeGB"],
                  disk_rows,
                  [10, 15, 10, 8, 8]
              )

          if not any([system_rows, dns_rows, service_rows, disk_rows]):
              gap()
              print(f"[{utc_now()}] SSM document output")
              print(text if text.strip() else "(no output)")
          PY

          if [ -n "${STANDARD_ERROR:-}" ]; then
            print_section_gap
            log "SSM standard error"
            printf "%s\n" "$STANDARD_ERROR"
          fi

          if [ "${FINAL_STATUS:-Unknown}" != "Success" ]; then
            echo "SSM details collection failed with status: ${FINAL_STATUS:-Unknown}" >&2
            exit 1
          fi

          print_section_gap
          log "Workflow completed successfully"
