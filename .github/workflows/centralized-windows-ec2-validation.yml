name: Centralized Windows EC2 Validation

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region
        required: true
        default: us-west-2
      server_name:
        description: EC2 Name tag
        required: false
        default: ""
      instance_id:
        description: EC2 instance id
        required: false
        default: ""
      expected_hostname:
        description: Expected Windows hostname
        required: false
        default: ""
      expected_timezone:
        description: Expected Windows timezone
        required: true
        default: "Mountain Standard Time"
      expected_domain:
        description: Expected AD domain
        required: false
        default: ""
      dns_name_to_resolve:
        description: Optional DNS name
        required: false
        default: ""
      required_services_csv:
        description: Required services
        required: true
        default: "AmazonSSMAgent,AmazonCloudWatchAgent,Amsp,scaleft-server-tools"
      fail_on_validation_issues:
        description: Fail if any server validation fails
        required: true
        default: "false"

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      DOCUMENT_NAME: Centralized-Windows-EC2-Validation

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.region }}
          role-to-assume: arn:aws:iam::345362761155:role/OIDCRoleForGitHubActions

      - name: Resolve target instance
        shell: bash
        env:
          REGION: ${{ inputs.region }}
          SERVER_NAME: ${{ inputs.server_name }}
          INSTANCE_ID: ${{ inputs.instance_id }}
        run: |
          set -euo pipefail

          if [ -n "$INSTANCE_ID" ]; then
            TARGET_INSTANCE_ID="$INSTANCE_ID"
          else
            IDS="$(aws ec2 describe-instances \
              --region "$REGION" \
              --filters "Name=tag:Name,Values=$SERVER_NAME" "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].InstanceId" \
              --output text)"

            if [ -z "$IDS" ] || [ "$IDS" = "None" ]; then
              echo "No running instance found for server_name=$SERVER_NAME" >&2
              exit 1
            fi

            set -- $IDS
            if [ "$#" -gt 1 ]; then
              echo "Multiple running instances found for server_name=$SERVER_NAME. Use instance_id." >&2
              exit 1
            fi

            TARGET_INSTANCE_ID="$1"
          fi

          echo "TARGET_INSTANCE_ID=$TARGET_INSTANCE_ID" >> "$GITHUB_ENV"
          echo "Target instance: $TARGET_INSTANCE_ID"

      - name: Display server attributes, EBS, and tags
        shell: bash
        env:
          REGION: ${{ inputs.region }}
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"

          INSTANCE_JSON="$(aws ec2 describe-instances \
            --region "$REGION" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --output json)"

          INSTANCE_NAME="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].Tags[]? | select(.Key=="Name") | .Value' | head -n1)"
          [ -n "${INSTANCE_NAME:-}" ] || INSTANCE_NAME="N/A"

          VPC_ID="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].VpcId // "N/A"')"
          SUBNET_ID="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].SubnetId // "N/A"')"
          PRIMARY_IP="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].PrivateIpAddress // "N/A"')"
          INSTANCE_TYPE="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].InstanceType // "N/A"')"

          EBS_COUNT="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].BlockDeviceMappings | length')"

          SECONDARY_IPS="$(echo "$INSTANCE_JSON" | jq -r '[.Reservations[0].Instances[0].NetworkInterfaces[0].PrivateIpAddresses[]? | select(.Primary==false) | .PrivateIpAddress] | join(",")')"
          [ -n "${SECONDARY_IPS:-}" ] || SECONDARY_IPS="None"

          SG_IDS="$(echo "$INSTANCE_JSON" | jq -r '[.Reservations[0].Instances[0].SecurityGroups[]?.GroupId] | join(",")')"
          SG_NAMES="$(echo "$INSTANCE_JSON" | jq -r '[.Reservations[0].Instances[0].SecurityGroups[]?.GroupName] | join(",")')"
          [ -n "${SG_IDS:-}" ] || SG_IDS="None"
          [ -n "${SG_NAMES:-}" ] || SG_NAMES="None"

          VPC_NAME="$(aws ec2 describe-tags \
            --region "$REGION" \
            --filters "Name=resource-id,Values=$VPC_ID" "Name=key,Values=Name" \
            --query "Tags[0].Value" \
            --output text 2>/dev/null || true)"
          [ -n "${VPC_NAME:-}" ] && [ "$VPC_NAME" != "None" ] || VPC_NAME="(No Name tag)"

          SUBNET_NAME="$(aws ec2 describe-tags \
            --region "$REGION" \
            --filters "Name=resource-id,Values=$SUBNET_ID" "Name=key,Values=Name" \
            --query "Tags[0].Value" \
            --output text 2>/dev/null || true)"
          [ -n "${SUBNET_NAME:-}" ] && [ "$SUBNET_NAME" != "None" ] || SUBNET_NAME="(No Name tag)"

          INSTANCE_TYPE_JSON="$(aws ec2 describe-instance-types \
            --region "$REGION" \
            --instance-types "$INSTANCE_TYPE" \
            --output json)"

          VCPU="$(echo "$INSTANCE_TYPE_JSON" | jq -r '.InstanceTypes[0].VCpuInfo.DefaultVCpus // "N/A"')"
          RAM_MIB="$(echo "$INSTANCE_TYPE_JSON" | jq -r '.InstanceTypes[0].MemoryInfo.SizeInMiB // 0')"
          RAM_GB="$(awk "BEGIN {printf \"%.2f\", $RAM_MIB/1024}")"

          HEALTH_JSON="$(aws ec2 describe-instance-status \
            --region "$REGION" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --include-all-instances \
            --output json)"

          SYSTEM_STATUS="$(echo "$HEALTH_JSON" | jq -r '.InstanceStatuses[0].SystemStatus.Status // "N/A"')"
          INSTANCE_STATUS="$(echo "$HEALTH_JSON" | jq -r '.InstanceStatuses[0].InstanceStatus.Status // "N/A"')"

          echo "Server attributes"
          printf "\n%-20s %-15s %-20s %-15s %-20s %-20s %-15s %-10s %-10s %-10s %-10s %-25s %-30s %-15s %-15s %-30s\n" \
          "Server Name" "Region" "Instance ID" "Account ID" "VPC Name" "Subnet Name" "Primary IP" "EBS Cnt" "Type" "vCPUs" "RAM(GB)" "SG Names" "SG IDs" "SysHealth" "InstHealth" "Sec. IPs"

          echo "--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------"

          printf "%-20s %-15s %-20s %-15s %-20s %-20s %-15s %-10s %-10s %-10s %-10s %-25s %-30s %-15s %-15s %-30s\n" \
          "$INSTANCE_NAME" "$REGION" "$TARGET_INSTANCE_ID" "$ACCOUNT_ID" "$VPC_NAME" "$SUBNET_NAME" "$PRIMARY_IP" "$EBS_COUNT" "$INSTANCE_TYPE" "$VCPU" "$RAM_GB" "$SG_NAMES" "$SG_IDS" "$SYSTEM_STATUS" "$INSTANCE_STATUS" "$SECONDARY_IPS"

          echo
          echo "Device Name     Volume ID            Type       Size(GB)   IOPS       Encrypted"
          echo "--------------------------------------------------------------------------------"

          BLOCK_DEVICE_ROWS="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].BlockDeviceMappings[]? | [.DeviceName, .Ebs.VolumeId] | @tsv')"

          if [ -z "${BLOCK_DEVICE_ROWS:-}" ]; then
            echo "No EBS volumes found."
          else
            while IFS=$'\t' read -r DEVICE VOLUME_ID; do
              [ -n "${VOLUME_ID:-}" ] || continue

              VOLUME_JSON="$(aws ec2 describe-volumes \
                --region "$REGION" \
                --volume-ids "$VOLUME_ID" \
                --output json)"

              VTYPE="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].VolumeType // "N/A"')"
              VSIZE="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].Size // "N/A"')"
              VIOPS="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].Iops // "N/A"')"
              VENCRYPTED="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].Encrypted // "N/A"')"

              printf "%-15s %-20s %-10s %-10s %-10s %-10s\n" \
              "$DEVICE" "$VOLUME_ID" "$VTYPE" "$VSIZE" "$VIOPS" "$VENCRYPTED"
            done <<< "$BLOCK_DEVICE_ROWS"
          fi

          echo
          echo "Tag Key                        Tag Value"
          echo "----------------------------------------------------------"

          TAG_ROWS="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].Tags[]? | [.Key, .Value] | @tsv')"

          if [ -z "${TAG_ROWS:-}" ]; then
            echo "No tags found."
          else
            while IFS=$'\t' read -r KEY VALUE; do
              printf "%-30s %-50s\n" "$KEY" "$VALUE"
            done <<< "$TAG_ROWS"
          fi

      - name: Run Windows validation via SSM document
        shell: bash
        env:
          REGION: ${{ inputs.region }}
          EXPECTED_HOSTNAME: ${{ inputs.expected_hostname }}
          EXPECTED_TIMEZONE: ${{ inputs.expected_timezone }}
          EXPECTED_DOMAIN: ${{ inputs.expected_domain }}
          DNS_NAME_TO_RESOLVE: ${{ inputs.dns_name_to_resolve }}
          REQUIRED_SERVICES_CSV: ${{ inputs.required_services_csv }}
          FAIL_ON_VALIDATION_ISSUES: ${{ inputs.fail_on_validation_issues }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json, os

          params = {
              "ExpectedHostname": [os.environ.get("EXPECTED_HOSTNAME", "")],
              "ExpectedTimezone": [os.environ.get("EXPECTED_TIMEZONE", "")],
              "ExpectedDomain": [os.environ.get("EXPECTED_DOMAIN", "")],
              "DnsNameToResolve": [os.environ.get("DNS_NAME_TO_RESOLVE", "")],
              "RequiredServicesCsv": [os.environ.get("REQUIRED_SERVICES_CSV", "")],
              "FailOnValidationIssues": [os.environ.get("FAIL_ON_VALIDATION_ISSUES", "false")]
          }

          with open("params.json", "w", encoding="utf-8") as f:
              json.dump(params, f)
          PY

          COMMAND_ID="$(aws ssm send-command \
            --region "$REGION" \
            --document-name "$DOCUMENT_NAME" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --parameters file://params.json \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM Command ID: $COMMAND_ID"

          FINAL_STATUS=""
          for _ in $(seq 1 24); do
            STATUS="$(aws ssm get-command-invocation \
              --region "$REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$TARGET_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)"

            case "$STATUS" in
              Success|Failed|TimedOut|Cancelled|Cancelling)
                FINAL_STATUS="$STATUS"
                break
                ;;
              *)
                sleep 5
                ;;
            esac
          done

          [ -n "$FINAL_STATUS" ] || FINAL_STATUS="$(aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --query "Status" \
            --output text)"

          STDOUT_CONTENT="$(aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text)"

          STDERR_CONTENT="$(aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text)"

          echo "$STDOUT_CONTENT"

          if [ -n "$STDERR_CONTENT" ] && [ "$STDERR_CONTENT" != "None" ]; then
            echo "$STDERR_CONTENT" >&2
          fi

          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "SSM validation failed with status: $FINAL_STATUS" >&2
            exit 1
          fi
