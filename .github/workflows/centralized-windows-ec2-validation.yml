name: Centralized-Windows-EC2-Validation

on:
  workflow_dispatch:
    inputs:
      region:
        description: "AWS region"
        required: true
        default: "us-west-2"
      server_name:
        description: "EC2 Name tag"
        required: false
        default: ""
      instance_id:
        description: "EC2 instance id"
        required: false
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      DOCUMENT_NAME: "Centralized-Windows-EC2-Validation"

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.region }}
          role-to-assume: arn:aws:iam::345362761155:role/OIDCRoleForGitHubActions

      - name: Resolve target instance, display EC2 attributes, and run SSM details
        shell: bash
        env:
          REGION: ${{ inputs.region }}
          SERVER_NAME: ${{ inputs.server_name }}
          INSTANCE_ID: ${{ inputs.instance_id }}
        run: |
          set -euo pipefail

          log() {
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] $*"
          }

          log "Resolving target instance..."

          if [ -z "$INSTANCE_ID" ] && [ -z "$SERVER_NAME" ]; then
            echo "Either instance_id or server_name must be provided." >&2
            exit 1
          fi

          if [ -n "$INSTANCE_ID" ]; then
            TARGET_INSTANCE_ID="$INSTANCE_ID"
          else
            IDS="$(aws ec2 describe-instances \
              --region "$REGION" \
              --filters "Name=tag:Name,Values=$SERVER_NAME" "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].InstanceId" \
              --output text)"

            if [ -z "$IDS" ] || [ "$IDS" = "None" ]; then
              echo "No running instance found for server_name=$SERVER_NAME" >&2
              exit 1
            fi

            set -- $IDS
            if [ "$#" -gt 1 ]; then
              echo "Multiple running instances found for server_name=$SERVER_NAME. Use instance_id." >&2
              exit 1
            fi

            TARGET_INSTANCE_ID="$1"
          fi

          echo "TARGET_INSTANCE_ID=$TARGET_INSTANCE_ID" >> "$GITHUB_ENV"

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"

          INSTANCE_JSON="$(aws ec2 describe-instances \
            --region "$REGION" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --output json)"

          INSTANCE_NAME="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].Tags[]? | select(.Key=="Name") | .Value' | head -n1)"
          [ -n "${INSTANCE_NAME:-}" ] || INSTANCE_NAME="N/A"

          INSTANCE_STATE="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].State.Name // "N/A"')"
          PLATFORM_DETAILS="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].PlatformDetails // "N/A"')"
          PRIVATE_IP="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].PrivateIpAddress // ""')"
          PRIVATE_DNS="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].PrivateDnsName // "N/A"')"
          PUBLIC_IP="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].PublicIpAddress // "N/A"')"
          VPC_ID="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].VpcId // "N/A"')"
          SUBNET_ID="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].SubnetId // "N/A"')"
          INSTANCE_TYPE="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].InstanceType // "N/A"')"
          AZ="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].Placement.AvailabilityZone // "N/A"')"
          EBS_COUNT="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].BlockDeviceMappings | length')"

          SECONDARY_IPS="$(echo "$INSTANCE_JSON" | jq -r '[.Reservations[0].Instances[0].NetworkInterfaces[0].PrivateIpAddresses[]? | select(.Primary==false) | .PrivateIpAddress] | join(",")')"
          [ -n "${SECONDARY_IPS:-}" ] || SECONDARY_IPS="None"

          SG_IDS="$(echo "$INSTANCE_JSON" | jq -r '[.Reservations[0].Instances[0].SecurityGroups[]?.GroupId] | join(",")')"
          SG_NAMES="$(echo "$INSTANCE_JSON" | jq -r '[.Reservations[0].Instances[0].SecurityGroups[]?.GroupName] | join(",")')"
          [ -n "${SG_IDS:-}" ] || SG_IDS="None"
          [ -n "${SG_NAMES:-}" ] || SG_NAMES="None"

          VPC_NAME="$(aws ec2 describe-tags \
            --region "$REGION" \
            --filters "Name=resource-id,Values=$VPC_ID" "Name=key,Values=Name" \
            --query "Tags[0].Value" \
            --output text 2>/dev/null || true)"
          [ -n "${VPC_NAME:-}" ] && [ "$VPC_NAME" != "None" ] || VPC_NAME="(No Name tag)"

          SUBNET_NAME="$(aws ec2 describe-tags \
            --region "$REGION" \
            --filters "Name=resource-id,Values=$SUBNET_ID" "Name=key,Values=Name" \
            --query "Tags[0].Value" \
            --output text 2>/dev/null || true)"
          [ -n "${SUBNET_NAME:-}" ] && [ "$SUBNET_NAME" != "None" ] || SUBNET_NAME="(No Name tag)"

          INSTANCE_TYPE_JSON="$(aws ec2 describe-instance-types \
            --region "$REGION" \
            --instance-types "$INSTANCE_TYPE" \
            --output json)"

          VCPU="$(echo "$INSTANCE_TYPE_JSON" | jq -r '.InstanceTypes[0].VCpuInfo.DefaultVCpus // "N/A"')"
          RAM_MIB="$(echo "$INSTANCE_TYPE_JSON" | jq -r '.InstanceTypes[0].MemoryInfo.SizeInMiB // 0')"
          RAM_GB="$(awk "BEGIN {printf \"%.2f\", $RAM_MIB/1024}")"

          HEALTH_JSON="$(aws ec2 describe-instance-status \
            --region "$REGION" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --include-all-instances \
            --output json)"

          SYSTEM_STATUS="$(echo "$HEALTH_JSON" | jq -r '.InstanceStatuses[0].SystemStatus.Status // "N/A"')"
          INSTANCE_STATUS="$(echo "$HEALTH_JSON" | jq -r '.InstanceStatuses[0].InstanceStatus.Status // "N/A"')"

          echo
          log "Server attributes"
          echo

          printf "%-20s %-15s %-20s %-15s %-15s %-20s %-20s %-15s %-15s %-10s %-10s %-10s %-12s %-15s %-15s %-30s\n" \
            "Server Name" "Region" "Instance ID" "Account ID" "AZ" "VPC Name" "Subnet Name" "Private IP" "Public IP" "EBS Cnt" "Type" "vCPUs" "RAM(GB)" "SysHealth" "InstHealth" "Sec. IPs"

          echo "--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------"

          printf "%-20s %-15s %-20s %-15s %-15s %-20s %-20s %-15s %-15s %-10s %-10s %-10s %-12s %-15s %-15s %-30s\n" \
            "$INSTANCE_NAME" "$REGION" "$TARGET_INSTANCE_ID" "$ACCOUNT_ID" "$AZ" "$VPC_NAME" "$SUBNET_NAME" "${PRIVATE_IP:-N/A}" "$PUBLIC_IP" "$EBS_COUNT" "$INSTANCE_TYPE" "$VCPU" "$RAM_GB" "$SYSTEM_STATUS" "$INSTANCE_STATUS" "$SECONDARY_IPS"

          echo
          echo "Instance State    : $INSTANCE_STATE"
          echo "Platform Details  : $PLATFORM_DETAILS"
          echo "Private DNS       : $PRIVATE_DNS"
          echo "VPC ID            : $VPC_ID"
          echo "Subnet ID         : $SUBNET_ID"
          echo "Security Groups   : $SG_NAMES"
          echo "Security Group IDs: $SG_IDS"

          echo
          echo "Device Name     Volume ID            Type       Size(GB)   IOPS       Encrypted"
          echo "--------------------------------------------------------------------------------"

          BLOCK_DEVICE_ROWS="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].BlockDeviceMappings[]? | [.DeviceName, .Ebs.VolumeId] | @tsv')"

          if [ -z "${BLOCK_DEVICE_ROWS:-}" ]; then
            echo "No EBS volumes found."
          else
            while IFS=$'\t' read -r DEVICE VOLUME_ID; do
              [ -n "${VOLUME_ID:-}" ] || continue

              VOLUME_JSON="$(aws ec2 describe-volumes \
                --region "$REGION" \
                --volume-ids "$VOLUME_ID" \
                --output json)"

              VTYPE="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].VolumeType // "N/A"')"
              VSIZE="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].Size // "N/A"')"
              VIOPS="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].Iops // "N/A"')"
              VENCRYPTED="$(echo "$VOLUME_JSON" | jq -r '.Volumes[0].Encrypted // "N/A"')"

              printf "%-15s %-20s %-10s %-10s %-10s %-10s\n" \
                "$DEVICE" "$VOLUME_ID" "$VTYPE" "$VSIZE" "$VIOPS" "$VENCRYPTED"
            done <<< "$BLOCK_DEVICE_ROWS"
          fi

          echo
          echo "Tag Key                        Tag Value"
          echo "----------------------------------------------------------"

          TAG_ROWS="$(echo "$INSTANCE_JSON" | jq -r '.Reservations[0].Instances[0].Tags[]? | [.Key, .Value] | @tsv')"

          if [ -z "${TAG_ROWS:-}" ]; then
            echo "No tags found."
          else
            while IFS=$'\t' read -r KEY VALUE; do
              printf "%-30s %-50s\n" "$KEY" "$VALUE"
            done <<< "$TAG_ROWS"
          fi

          echo
          log "Sending SSM details command..."

          COMMAND_ID="$(aws ssm send-command \
            --region "$REGION" \
            --document-name "$DOCUMENT_NAME" \
            --instance-ids "$TARGET_INSTANCE_ID" \
            --query "Command.CommandId" \
            --output text)"

          echo "SSM Command ID: $COMMAND_ID"

          ATTEMPT=0
          FINAL_STATUS=""

          while [ "$ATTEMPT" -lt 30 ]; do
            ATTEMPT=$((ATTEMPT + 1))

            STATUS="$(aws ssm get-command-invocation \
              --region "$REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$TARGET_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)"

            case "$STATUS" in
              Success)
                FINAL_STATUS="Success"
                log "SSM command completed successfully"
                break
                ;;
              Failed|TimedOut|Cancelled|Cancelling)
                FINAL_STATUS="$STATUS"
                log "SSM command completed with status: $STATUS"
                break
                ;;
              Pending|InProgress|Delayed|"")
                log "Waiting for SSM command... attempt $ATTEMPT/30"
                sleep 6
                ;;
              *)
                log "SSM command current status: $STATUS"
                sleep 6
                ;;
            esac
          done

          if [ -z "$FINAL_STATUS" ]; then
            FINAL_STATUS="$(aws ssm get-command-invocation \
              --region "$REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$TARGET_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo Unknown)"
          fi

          echo
          log "Retrieving SSM invocation details..."

          INVOCATION_JSON="$(aws ssm list-command-invocations \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --details \
            --output json)"

          echo
          log "SSM plugin details"

          echo "$INVOCATION_JSON" | jq -r '
            .CommandInvocations[0].CommandPlugins[]? |
            "Plugin: " + (.Name // "N/A") + "\n" +
            "Status: " + (.Status // "N/A") + "\n" +
            "ResponseCode: " + ((.ResponseCode // "N/A") | tostring) + "\n" +
            "----- Output -----\n" +
            (.Output // "(no output)") + "\n" +
            "------------------"
          '

          STDOUT_CONTENT="$(aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text 2>/dev/null || true)"

          STDERR_CONTENT="$(aws ssm get-command-invocation \
            --region "$REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$TARGET_INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text 2>/dev/null || true)"

          if [ -n "${STDOUT_CONTENT:-}" ] && [ "$STDOUT_CONTENT" != "None" ]; then
            echo
            log "Top-level stdout"
            printf "%b\n" "$STDOUT_CONTENT"
          fi

          if [ -n "${STDERR_CONTENT:-}" ] && [ "$STDERR_CONTENT" != "None" ]; then
            echo
            log "Top-level stderr"
            printf "%b\n" "$STDERR_CONTENT" >&2
          fi

          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "SSM details collection failed with status: $FINAL_STATUS" >&2
            exit 1
          fi

          echo
          log "Workflow completed successfully"
